name: Live AI Model Tests

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  live-ai-tests:
    name: Live AI API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --audit=false
      - name: Run live AI API tests and report results
        run: |
          npx jest --ci --no-coverage --testPathPatterns=live-api --forceExit --runInBand --testTimeout=8000 --json --outputFile=/tmp/live-results.json || true
          node -e "
            const fs = require('fs');
            try {
              const r = JSON.parse(fs.readFileSync('/tmp/live-results.json', 'utf8'));
              const passed = r.numPassedTests, total = r.numTotalTests;
              const pct = total ? Math.round(passed / total * 100) : 0;
              const pass = pct >= 80;
              const icon = pass ? '✅' : '❌';
              console.log(icon + ' Live AI tests: ' + passed + '/' + total + ' passed (' + pct + '%)');
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '### 🤖 Live AI Model Tests\n**' + passed + '/' + total + ' (' + pct + '%)**\n' + icon + '\n');
              process.exit(pass ? 0 : 1);
            } catch(e) {
              console.log('⚠️ Live AI tests: no results (API unreachable or key missing).');
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '### 🤖 Live AI Model Tests\n**Status:** Skipped (API unavailable).\n');
            }
          "
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
