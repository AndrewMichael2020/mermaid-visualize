name: Live AI Model Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  live-ai-tests:
    name: Live Gemini API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run live Gemini API tests and report results
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "ℹ️ GEMINI_API_KEY not configured — tests skipped."
            printf '### 🤖 Live AI Model Tests\n**Status:** API key not configured — skipped.\n✅ Treated as passing.\n' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          npm run test -- --ci --no-coverage --testPathPatterns=live-api --forceExit --json --outputFile=/tmp/live-results.json || true
          node -e "
            const fs = require('fs');
            try {
              const r = JSON.parse(fs.readFileSync('/tmp/live-results.json', 'utf8'));
              const total = r.numTotalTests, passed = r.numPassedTests;
              if (total === 0) {
                console.log('⚠️ Live AI tests: no test files found — check testPathPatterns.');
                fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '### 🤖 Live AI Model Tests\n⚠️ **No test files matched** — check testPathPatterns.\n');
                process.exit(1);
              }
              const pct = Math.round(passed / total * 100);
              const pass = pct >= 80;
              const icon = pass ? '✅' : '❌';
              console.log(icon + ' Live AI tests: ' + passed + '/' + total + ' passed (' + pct + '%)');
              const summary = '### 🤖 Live AI Model Tests\n**' + passed + '/' + total + ' passed (' + pct + '%)**\n' + icon + ' ' + (pass ? '≥80% threshold met — PASSING' : 'Below 80% threshold — FAILING') + '\n';
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
              process.exit(pass ? 0 : 1);
            } catch(e) {
              console.log('ℹ️ Live AI tests: results unavailable — treated as passing.');
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '### 🤖 Live AI Model Tests\n**Status:** API unavailable — treated as passing.\n');
              process.exit(0);
            }
          "
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
