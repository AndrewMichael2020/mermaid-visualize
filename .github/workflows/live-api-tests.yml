name: Live AI Model Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  live-ai-tests:
    name: Live Gemini API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run live Gemini API tests
        run: npm test -- --ci --testPathPattern="live-api" --no-coverage
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
